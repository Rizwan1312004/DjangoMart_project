{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Set a new password for your DjangoMart account.">
    <title>Set New Password – DjangoMart</title>
    <link rel="icon" href="{% static 'images/favicon.ico' %}">
    <link rel="stylesheet" href="{% static 'css/bootstrap.css' %}">
    <link rel="stylesheet" href="{% static 'fonts/fontawesome/css/all.min.css' %}">

    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f1623 0%, #1a2340 50%, #1e2d50 100%);
            display: flex;
            flex-direction: column;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        /* ---- Top bar ---- */
        .auth-topbar {
            background: rgba(255,255,255,0.04);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding: 14px 0;
        }
        .auth-topbar .brand-name {
            font-size: 1.45rem;
            font-weight: 800;
            color: #fff;
            text-decoration: none;
            letter-spacing: -0.5px;
        }
        .auth-topbar .brand-name span { color: #3167eb; }
        .auth-topbar .back-link {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            transition: color 0.2s;
        }
        .auth-topbar .back-link:hover { color: #fff; }
        .auth-topbar .back-link i { margin-right: 4px; }

        /* ---- Decorative circles ---- */
        .auth-bg-circle {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
        }
        .circle-1 { width: 400px; height: 400px; background: rgba(49,103,235,0.25); top: -100px; left: -100px; }
        .circle-2 { width: 300px; height: 300px; background: rgba(255,144,23,0.15); bottom: -80px; right: -80px; }

        /* ---- Main ---- */
        .auth-main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 48px 16px;
        }

        /* ---- Card ---- */
        .auth-card {
            position: relative;
            z-index: 1;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 32px 80px rgba(0,0,0,0.35), 0 0 0 1px rgba(255,255,255,0.06);
            width: 100%;
            max-width: 460px;
            overflow: hidden;
        }

        /* ---- Card header ---- */
        .auth-card-header {
            background: linear-gradient(135deg, #3167eb 0%, #1a4bcc 100%);
            padding: 32px 40px 28px;
            text-align: center;
        }
        .auth-card-header .store-icon {
            width: 56px; height: 56px;
            background: rgba(255,255,255,0.15);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 14px;
            backdrop-filter: blur(4px);
        }
        .auth-card-header .store-icon i { color: #fff; font-size: 1.5rem; }
        .auth-card-header h1 { color: #fff; font-size: 1.45rem; font-weight: 800; margin: 0 0 6px; }
        .auth-card-header p { color: rgba(255,255,255,0.78); font-size: 0.88rem; margin: 0; }

        /* ---- Card body ---- */
        .auth-card-body { padding: 36px 40px 32px; }

        .auth-card-body label {
            font-size: 0.82rem;
            font-weight: 600;
            color: #495057;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }

        /* ---- Password wrapper ---- */
        .password-wrapper {
            position: relative;
        }
        .password-wrapper .form-control {
            border: 1.5px solid #dee2e6;
            border-radius: 8px;
            padding: 10px 42px 10px 14px;
            font-size: 0.92rem;
            transition: border-color 0.2s, box-shadow 0.2s;
            width: 100%;
        }
        .password-wrapper .form-control:focus {
            border-color: #3167eb;
            box-shadow: 0 0 0 3px rgba(49,103,235,0.15);
            outline: none;
        }
        .toggle-pw {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #adb5bd;
            cursor: pointer;
            padding: 0;
            font-size: 0.9rem;
            transition: color 0.2s;
        }
        .toggle-pw:hover { color: #3167eb; }

        /* ---- Strength meter ---- */
        .strength-meter {
            height: 4px;
            border-radius: 4px;
            background: #e9ecef;
            margin-top: 8px;
            overflow: hidden;
        }
        .strength-bar {
            height: 100%;
            width: 0%;
            border-radius: 4px;
            transition: width 0.3s, background 0.3s;
        }
        .strength-label {
            font-size: 0.75rem;
            color: #adb5bd;
            margin-top: 4px;
            min-height: 16px;
        }

        /* ---- Match indicator ---- */
        .match-hint {
            font-size: 0.75rem;
            margin-top: 4px;
            min-height: 16px;
        }
        .match-hint.ok { color: #28a745; }
        .match-hint.no { color: #dc3545; }

        /* ---- Primary button ---- */
        .btn-auth-primary {
            display: block;
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #3167eb 0%, #1a4bcc 100%);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 0.3px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            margin-top: 8px;
        }
        .btn-auth-primary:hover {
            background: linear-gradient(135deg, #254fc3 0%, #1238a0 100%);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(49,103,235,0.35);
        }
        .btn-auth-primary i { margin-right: 6px; }
        .btn-auth-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }

        /* ---- Trust badges ---- */
        .trust-badges { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
        .trust-badge { display: flex; align-items: center; gap: 5px; font-size: 0.75rem; color: #adb5bd; }
        .trust-badge i { color: #3167eb; font-size: 0.8rem; }

        @media (max-width: 480px) {
            .auth-card-header { padding: 24px 24px 20px; }
            .auth-card-body { padding: 28px 24px 24px; }
        }
    </style>
</head>
<body>

<div class="auth-bg-circle circle-1"></div>
<div class="auth-bg-circle circle-2"></div>

<!-- Top bar -->
<div class="auth-topbar">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center">
            <a href="{% url 'home' %}" class="brand-name">Django<span>Mart</span></a>
            <a href="{% url 'login_user' %}" class="back-link">
                <i class="fas fa-arrow-left"></i> Back to Login
            </a>
        </div>
    </div>
</div>

<!-- Main -->
<main class="auth-main">
    <div class="auth-card">

        <!-- Card Header -->
        <div class="auth-card-header">
            <div class="store-icon">
                <i class="fas fa-lock"></i>
            </div>
            <h1>Set New Password</h1>
            <p>Choose a strong password for your account</p>
        </div>

        <!-- Card Body -->
        <div class="auth-card-body">

            {% if messages %}
            {% for message in messages %}
            <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} alert-dismissible fade show mb-3"
                 role="alert" style="font-size:0.85rem; border-radius:8px;">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            {% endfor %}
            {% endif %}

            <form method="POST" action="{% url 'resetpassword_confirm' %}" id="resetPasswordForm">
                {% csrf_token %}

                <!-- New password -->
                <div class="mb-3">
                    <label for="password">New Password</label>
                    <div class="password-wrapper">
                        <input type="password" class="form-control" id="password"
                               name="password" placeholder="Enter new password" required autocomplete="new-password">
                        <button type="button" class="toggle-pw" onclick="togglePw('password', this)" tabindex="-1">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="strength-meter"><div class="strength-bar" id="strengthBar"></div></div>
                    <div class="strength-label" id="strengthLabel"></div>
                </div>

                <!-- Confirm password -->
                <div class="mb-4">
                    <label for="confirm_password">Confirm Password</label>
                    <div class="password-wrapper">
                        <input type="password" class="form-control" id="confirm_password"
                               name="confirm_password" placeholder="Re-enter new password" required autocomplete="new-password">
                        <button type="button" class="toggle-pw" onclick="togglePw('confirm_password', this)" tabindex="-1">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="match-hint" id="matchHint"></div>
                </div>

                <button class="btn-auth-primary" type="submit" id="submitBtn">
                    <i class="fas fa-check-circle"></i> Reset Password
                </button>
            </form>

            <div class="trust-badges">
                <span class="trust-badge"><i class="fas fa-shield-alt"></i> Secure</span>
                <span class="trust-badge"><i class="fas fa-lock"></i> SSL Encrypted</span>
            </div>

        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Toggle show/hide password
    function togglePw(fieldId, btn) {
        const input = document.getElementById(fieldId);
        const icon  = btn.querySelector('i');
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    }

    // Password strength meter
    const pwInput    = document.getElementById('password');
    const bar        = document.getElementById('strengthBar');
    const label      = document.getElementById('strengthLabel');
    const confInput  = document.getElementById('confirm_password');
    const matchHint  = document.getElementById('matchHint');
    const submitBtn  = document.getElementById('submitBtn');

    pwInput.addEventListener('input', () => {
        const val = pwInput.value;
        let score = 0;
        if (val.length >= 8)             score++;
        if (/[A-Z]/.test(val))           score++;
        if (/[0-9]/.test(val))           score++;
        if (/[^A-Za-z0-9]/.test(val))   score++;

        const levels = [
            { pct: '0%',   color: '#e9ecef', text: '' },
            { pct: '25%',  color: '#dc3545', text: 'Weak' },
            { pct: '50%',  color: '#fd7e14', text: 'Fair' },
            { pct: '75%',  color: '#ffc107', text: 'Good' },
            { pct: '100%', color: '#28a745', text: 'Strong' },
        ];
        bar.style.width      = levels[score].pct;
        bar.style.background = levels[score].color;
        label.textContent    = levels[score].text;
        label.style.color    = levels[score].color;

        checkMatch();
    });

    confInput.addEventListener('input', checkMatch);

    function checkMatch() {
        if (!confInput.value) { matchHint.textContent = ''; return; }
        if (pwInput.value === confInput.value) {
            matchHint.textContent = '✓ Passwords match';
            matchHint.className   = 'match-hint ok';
            submitBtn.disabled    = false;
        } else {
            matchHint.textContent = '✗ Passwords do not match';
            matchHint.className   = 'match-hint no';
            submitBtn.disabled    = true;
        }
    }
</script>
</body>
</html>
